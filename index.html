  // Counterparties (KYC registry)
  if(method==='GET'&&path==='/api/counterparties'){ requireAuth(); return {counterparties:DB.counterparties.map(cpSummary)}; }
  if(method==='POST'&&path==='/api/counterparties'){ requireRole(['admin','trader']); var vc=validateCp(body); if(vc.errors.length)throw err(400,'Validation failed',vc.errors); var now=new Date().toISOString(); var cp=Object.assign({id:uuid()},vc.value,{status:'submitted',createdBy:CURRENT.id,createdByName:CURRENT.displayName,submittedBy:CURRENT.id,submittedByName:CURRENT.displayName,submittedAt:now,createdAt:now,updatedAt:now,history:[{at:now,by:CURRENT.displayName,action:'submitted'}]}); DB.counterparties.push(cp); audit('counterparty_submitted','counterparty',cp.id,{name:cp.fullLegalName}); commit(); return {counterparty:cp}; }
  if((m=path.match(/^\/api\/counterparties\/([^\/]+)\/decide$/))&&method==='POST'){ requireRole(['admin','approver']); var cpd=DB.counterparties.filter(function(x){return x.id===m[1];})[0]; if(!cpd)throw err(404,'Counterparty not found'); if(cpd.status!=='submitted')throw err(409,'Only submitted counterparties can be decided (current: "'+cpd.status+'")'); var dec=String(body.decision||''); if(['approved','rejected'].indexOf(dec)<0)throw err(400,'decision must be "approved" or "rejected"'); var note=body.note?String(body.note).slice(0,1000):null; var nowd=new Date().toISOString(); cpd.status=dec; cpd.decidedBy=CURRENT.displayName; cpd.decidedAt=nowd; cpd.decisionNote=note; if(dec==='approved'){ cpd.approvedAt=nowd; cpd.approvedBy=CURRENT.displayName; } cpd.updatedAt=nowd; cpd.history=(cpd.history||[]); cpd.history.push({at:nowd,by:CURRENT.displayName,action:dec,note:note}); audit('counterparty_'+dec,'counterparty',cpd.id,{name:cpd.fullLegalName}); commit(); return {counterparty:cpd}; }
  if((m=path.match(/^\/api\/counterparties\/([^\/]+)\/verify$/))&&method==='POST'){ requireRole(['admin','approver']); var cpv=DB.counterparties.filter(function(x){return x.id===m[1];})[0]; if(!cpv)throw err(404,'Counterparty not found'); cpv.verification={source:String(body.source||'manual').slice(0,80),checkedBy:CURRENT.displayName,checkedAt:new Date().toISOString(),fields:(body.fields&&typeof body.fields==='object')?body.fields:{},manual:!!body.manual,note:body.note?String(body.note).slice(0,1000):null}; cpv.updatedAt=new Date().toISOString(); audit('counterparty_verified','counterparty',cpv.id,{source:cpv.verification.source,manual:cpv.verification.manual}); commit(); return {counterparty:cpv}; }
    if((m=path.match(/^\/api\/counterparties\/([^\/]+)$/))){ var cp2=DB.counterparties.filter(function(x){return x.id===m[1];})[0];
    if(method==='GET'){ requireAuth(); if(!cp2)throw err(404,'Counterparty not found'); return {counterparty:cp2, editable:canEditCp(CURRENT,cp2), canDecide:(CURRENT.role==='admin'||CURRENT.role==='approver')}; }
    if(method==='PUT'){ requireAuth(); if(!cp2)throw err(404,'Counterparty not found'); if(!canEditCp(CURRENT,cp2))throw err(403,'Not permitted to edit this counterparty'); var vc2=validateCp(body); if(vc2.errors.length)throw err(400,'Validation failed',vc2.errors); Object.keys(vc2.value).forEach(function(k){ cp2[k]=vc2.value[k]; }); var nowu=new Date().toISOString(); cp2.status='submitted'; cp2.submittedBy=CURRENT.id; cp2.submittedByName=CURRENT.displayName; cp2.submittedAt=nowu; cp2.updatedAt=nowu; cp2.history=(cp2.history||[]); cp2.history.push({at:nowu,by:CURRENT.displayName,action:'resubmitted'}); audit('counterparty_resubmitted','counterparty',cp2.id,{name:cp2.fullLegalName}); commit(); return {counterparty:cp2}; }
  }
  // Product summary (admin)
  if(method==='GET'&&path==='/api/admin/summary'){ requireRole(['admin','approver']);
    var byC={}; function eC(cc){ if(!byC[cc])byC[cc]={commodity:cc,total:0,approved:0,rejected:0,pending:0,approvalRequired:0,subs:{}}; return byC[cc]; }
    function eS(rr,sc){ if(!rr.subs[sc])rr.subs[sc]={subCommodity:sc,total:0,approved:0,rejected:0,pending:0,approvalRequired:0}; return rr.subs[sc]; }
    DB.trades.forEach(function(t){ var cc=t.input.commodity||'(Unspecified)'; var sc=t.input.subCommodity||'(Unspecified)'; var rr=eC(cc); var ss=eS(rr,sc); [rr,ss].forEach(function(o){ o.total++; if(t.status==='approved')o.approved++; else if(t.status==='rejected')o.rejected++; else o.pending++; if(t.verdict&&t.verdict.status==='APPROVAL REQUIRED')o.approvalRequired++; }); });
    var rows=Object.keys(byC).map(function(k){ var rr=byC[k]; rr.subs=Object.keys(rr.subs).map(function(s){return rr.subs[s];}).sort(function(a,b){return b.total-a.total;}); return rr; }).filter(function(r){return r.total>0;}).sort(function(a,b){return b.total-a.total;});
    var totals={total:0,approved:0,rejected:0,pending:0}; rows.forEach(function(r){totals.total+=r.total;totals.approved+=r.approved;totals.rejected+=r.rejected;totals.pending+=r.pending;}); return {rows:rows,totals:totals}; }
  throw err(404,'Endpoint not found');

  function requireAuth(){ if(!CURRENT)throw err(401,'Authentication required'); }
  function requireRole(roles){ requireAuth(); if(roles.indexOf(CURRENT.role)<0)throw err(403,'Insufficient permissions for this action'); }
}

// Promise-based shim so the UI's `await api(...)` works unchanged.
function api(method, path, body){
  return new Promise(function(resolve,reject){
    setTimeout(function(){ try{ resolve(localApi(method,path,body)); }catch(e){ if(e.status===401){ CURRENT=null; renderLogin(); } reject(e); } }, 0);
  });
}

// ---- First-run setup (create the first administrator) ------
function needsSetup(){ return !DB.users || DB.users.length===0; }
function renderSetup(){
  clear(app);
  var un=h('input',{type:'text',value:'admin'}); var dn=h('input',{type:'text',value:'System Administrator'});
  var pw=h('input',{type:'password'}); var cf=h('input',{type:'password'});
  var e=h('div',{class:'auth-err',style:'display:none'});
  function submit(){ e.style.display='none';
    if(!/^[a-zA-Z0-9._-]{3,32}$/.test(un.value)){e.textContent='Username must be 3-32 chars: letters, digits, . _ -';e.style.display='block';return;}
    if(!strongPw(pw.value)){e.textContent='Password must be at least 12 characters with upper, lower, digit and symbol.';e.style.display='block';return;}
    if(pw.value!==cf.value){e.textContent='Passwords do not match';e.style.display='block';return;}
    var admin={id:uuid(),username:un.value.trim(),displayName:dn.value.trim()||un.value.trim(),role:'admin',pw:hashPassword(pw.value),mustChangePassword:false,active:true,failed:0,lockedUntil:0,createdAt:new Date().toISOString()};
    DB.users.push(admin); CURRENT=admin; try{sessionStorage.setItem('trps.sid',admin.id);}catch(x){} audit('admin_bootstrap'); commit();
    toast('Administrator account created','ok'); loadMetaAndRender();
  }
  var card=h('div',{class:'auth-card'},[
    h('div',{class:'logo-band'}, h('img',{src:KRG_LOGO, alt:'Konexus Resources Group', class:'krg-logo'})),
    h('div',{class:'head'},[h('span',{class:'brandmark',html:brandSVG(30)+'<span class=\"wm\">KRG&nbsp;<b>TRPS</b></span>'}),h('div',{class:'tagline'},'Konexus Resources Group · First-time setup')]),
    h('div',{class:'body'},[
      h('div',{class:'banner-warn'},'No accounts exist yet. Create the first administrator to begin.'),
      h('label',{},'Admin username'),un,
      h('label',{},'Display name'),dn,
      h('label',{},'Password'),pw,
      h('div',{class:'hint'},'At least 12 characters with upper, lower, digit and symbol.'),
      h('label',{},'Confirm password'),cf,
      e,
      h('button',{class:'btn primary',onclick:submit},'Create administrator & sign in')
    ])
  ]);
  app.appendChild(h('div',{class:'auth-screen'},card));
}

// ---- boot --------------------------------------------------
async function boot(){
  if(needsSetup()) return renderSetup();
  try{ var me=await api('GET','/api/auth/me'); state.user=me.user; if(me.user.mustChangePassword) return openPasswordModal(true); await loadMetaAndRender(); }
  catch(_){ renderLogin(); }
}

</script>
<script>boot();</script>
