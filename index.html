<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>Metals TRPS — Konexus Resources Group</title>
<style>
/* =========================================================================
   Metals TRPS — Konexus Resources Group.  Fully variable-driven theming:
   light default; dark via [data-theme="dark"] OR system pref in Auto mode.
   Frosted-glass surfaces. Responsive.
   ========================================================================= */
:root {
  /* brand (theme-independent) */
  --navy:#143a63; --navy-deep:#0f2c4c; --navy-mid:#184878; --brand:#1f5fa6; --brand-2:#2f7bd0; --steel:#6078a8;
  --clear:#2f7d6b; --appr:#b7791f; --block:#b23b3b;
  /* light surfaces */
  --surface:#ffffff; --surface-2:#f2f6fb; --line:#d6dde7; --line-2:#c3ccd9;
  --ink:#15283f; --ink-soft:#4f5f78; --ink-faint:#8492a6;
  --clear-bg:#e4f1ed; --appr-bg:#f6ecd5; --block-bg:#f5e2e1;
  --glass:rgba(255,255,255,.55); --glass-brd:rgba(255,255,255,.7);
  --sidebar-bg:rgba(15,42,74,.82); --head-accent:#184878; --blotter-bg:#0c1a2b;
  --shadow:0 1px 2px rgba(15,28,45,.06),0 8px 24px rgba(15,28,45,.09);
  --bg-grad:
    radial-gradient(900px 520px at 10% -8%, rgba(31,95,166,.16), transparent 60%),
    radial-gradient(820px 520px at 112% 8%, rgba(96,120,168,.20), transparent 55%),
    linear-gradient(180deg,#eef2f7,#dde6f0);
  color-scheme: light;
  --glass-blur: blur(16px) saturate(1.4);
  --mono: ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Menlo,Consolas,monospace;
  --sans: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --radius:6px; --rail-w:62px; --rail-w-open:224px;
}
/* dark values applied for explicit dark OR (auto mode AND system dark) */
:root[data-theme="dark"],
:root[data-theme="auto"] {}
:root[data-theme="dark"] {
  --surface:#16212f; --surface-2:#1b2836; --line:#2a3a4e; --line-2:#34465c;
  --ink:#e7eef6; --ink-soft:#a6b6c9; --ink-faint:#71829a;
  --clear-bg:#123028; --appr-bg:#33280f; --block-bg:#35201f;
  --glass:rgba(22,33,48,.50); --glass-brd:rgba(255,255,255,.10);
  --sidebar-bg:rgba(9,18,31,.84); --head-accent:#5aa0e8; --brand:#4f9be6; --brand-2:#6fb0ee; --blotter-bg:#0a1524;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.42);
  --bg-grad:
    radial-gradient(900px 520px at 10% -8%, rgba(31,95,166,.22), transparent 60%),
    radial-gradient(820px 520px at 112% 8%, rgba(18,40,72,.55), transparent 55%),
    linear-gradient(180deg,#0c141f,#0a1017);
  color-scheme: dark;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]):not([data-theme="dark"]) {
    --surface:#16212f; --surface-2:#1b2836; --line:#2a3a4e; --line-2:#34465c;
    --ink:#e7eef6; --ink-soft:#a6b6c9; --ink-faint:#71829a;
    --clear-bg:#123028; --appr-bg:#33280f; --block-bg:#35201f;
    --glass:rgba(22,33,48,.50); --glass-brd:rgba(255,255,255,.10);
    --sidebar-bg:rgba(9,18,31,.84); --head-accent:#5aa0e8; --brand:#4f9be6; --brand-2:#6fb0ee; --blotter-bg:#0a1524;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.42);
    --bg-grad:
      radial-gradient(900px 520px at 10% -8%, rgba(31,95,166,.22), transparent 60%),
      radial-gradient(820px 520px at 112% 8%, rgba(18,40,72,.55), transparent 55%),
      linear-gradient(180deg,#0c141f,#0a1017);
    color-scheme: dark;
  }
}

* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  font-family:var(--sans); color:var(--ink); font-size:14px; line-height:1.45;
  -webkit-font-smoothing:antialiased; min-height:100vh;
  background:var(--bg-grad) fixed;
}
a { color:var(--brand); }
button { font-family:inherit; cursor:pointer; }
:focus-visible { outline:2px solid var(--brand); outline-offset:2px; }
@media (prefers-reduced-motion: reduce) { * { transition:none!important; animation:none!important; } }
.mono { font-family:var(--mono); font-variant-numeric:tabular-nums; }
.eyebrow { font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; }

/* Brand mark */
.brandmark { display:inline-flex; align-items:center; gap:9px; color:inherit; }
.brandmark .wm { font-family:var(--mono); font-weight:700; letter-spacing:.04em; font-size:17px; line-height:1; }
.brandmark .wm b { color:var(--brand-2); }
.logo-band { background:#fff; padding:16px 24px; display:flex; justify-content:center; border-bottom:1px solid var(--line); }
.krg-logo { height:40px; width:auto; display:block; }

/* App shell */
.app-shell { display:flex; min-height:100vh; }
.sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--rail-w); z-index:60;
  background:var(--sidebar-bg); -webkit-backdrop-filter:blur(16px) saturate(1.3); backdrop-filter:blur(16px) saturate(1.3);
  color:#cfdcea; display:flex; flex-direction:column; overflow:hidden; transition:width .18s ease; border-right:1px solid rgba(255,255,255,.06); }
.sidebar:hover, .sidebar.open { width:var(--rail-w-open); box-shadow:6px 0 24px rgba(0,0,0,.22); }
.sidebar-top { height:56px; display:flex; align-items:center; gap:10px; padding:0 16px; border-bottom:1px solid rgba(255,255,255,.08); color:#fff; white-space:nowrap; }
.sidebar-top svg, .brand-ico svg { color:#fff; }
.sidebar-labels { opacity:0; transition:opacity .12s ease; white-space:nowrap; }
.sidebar:hover .sidebar-labels, .sidebar.open .sidebar-labels { opacity:1; }
.nav { flex:1; padding:10px 0; overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:14px; width:100%; border:0; background:transparent; color:#cfdcea; padding:11px 18px; font-size:13.5px; white-space:nowrap; text-align:left; border-left:3px solid transparent; }
.nav-item svg { width:22px; height:22px; flex:none; }
.nav-item:hover { background:rgba(255,255,255,.07); color:#fff; }
.nav-item.active { background:rgba(255,255,255,.11); color:#fff; border-left-color:var(--brand-2); }
.nav-label { opacity:0; transition:opacity .12s ease; }
.sidebar:hover .nav-label, .sidebar.open .nav-label { opacity:1; }
.main { flex:1; margin-left:var(--rail-w); min-width:0; display:flex; flex-direction:column; }
.topbar { position:sticky; top:0; z-index:40; height:54px; display:flex; align-items:center; gap:14px; padding:0 20px;
  background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border-bottom:1px solid var(--glass-brd); }
.topbar .page-title { font-size:15px; font-weight:600; color:var(--ink); }
.topbar .spacer { flex:1; }
.hamburger { display:none; background:transparent; border:0; color:var(--ink); padding:6px; }
.icon-btn { background:transparent; border:1px solid var(--line-2); color:var(--ink-soft); border-radius:var(--radius); padding:6px 9px; font-size:12px; display:inline-flex; align-items:center; gap:6px; }
.icon-btn:hover { border-color:var(--brand); color:var(--brand); }
.usermenu { display:flex; align-items:center; gap:12px; }
.um-id { display:flex; align-items:center; gap:8px; }
.um-name { font-size:13px; font-weight:600; color:var(--ink); }
.role-chip { font-size:9.5px; letter-spacing:.09em; text-transform:uppercase; padding:2px 8px; border-radius:10px; background:var(--surface-2); color:var(--ink-soft); }
.role-chip.admin { background:var(--brand); color:#fff; }
.role-chip.approver { background:var(--clear); color:#fff; }
.role-chip.trader { background:var(--steel); color:#fff; }
.backdrop-nav { display:none; }
.wrap { max-width:1220px; width:100%; margin:0 auto; padding:22px 20px 70px; }

.page-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:18px; gap:16px; flex-wrap:wrap; }
.page-head h1 { font-size:21px; margin:2px 0 0; letter-spacing:-.01em; color:var(--ink); }
.page-head .lead { color:var(--ink-soft); font-size:13px; }

.btn { border:1px solid var(--line-2); background:var(--surface); color:var(--ink); padding:8px 14px; border-radius:var(--radius); font-size:13px; font-weight:500; }
.btn:hover { border-color:var(--brand); }
.btn.primary { background:var(--brand); color:#fff; border-color:var(--brand); }
.btn.primary:hover { background:var(--brand-2); border-color:var(--brand-2); }
.btn.brass { background:var(--navy-mid); border-color:var(--navy-mid); color:#fff; font-weight:600; }
.btn.brass:hover { background:var(--navy); }
.btn.patina { background:var(--clear); border-color:var(--clear); color:#fff; }
.btn.oxide { background:var(--block); border-color:var(--block); color:#fff; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn.sm { padding:5px 10px; font-size:12px; }

.card { background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-brd); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:18px; }
.card > .card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 16px; border-bottom:1px solid var(--glass-brd); flex-wrap:wrap; }
.card > .card-head h2 { font-size:12px; letter-spacing:.1em; text-transform:uppercase; margin:0; color:var(--head-accent); }
.card-body { padding:14px 16px; }

.row { display:grid; grid-template-columns:190px 1fr 190px; gap:12px; align-items:center; padding:5px 0; }
.row > label { font-size:12.5px; color:var(--ink-soft); }
.row .field input, .row .field select, .row .field textarea { width:100%; padding:7px 9px; border:1px solid var(--line-2); border-radius:var(--radius); font-size:13px; background:var(--surface); color:var(--ink); font-family:inherit; }
.row .field input:focus, .row .field select:focus { border-color:var(--brand); }
.row .field input[readonly], .field input.locked { background:var(--surface-2); color:var(--ink-soft); border-style:dashed; cursor:not-allowed; }
.locked-tag { font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-left:6px; }
.numgrid { display:grid; grid-template-columns:1fr 150px 1fr; gap:12px; align-items:center; padding:5px 0; }
.numgrid > label { font-size:12.5px; color:var(--ink-soft); }
.numgrid .field input { width:100%; text-align:right; font-family:var(--mono); padding:7px 9px; border:1px solid var(--line-2); border-radius:var(--radius); background:var(--surface); color:var(--ink); }
.numgrid .field input.locked { background:var(--surface-2); color:var(--ink-soft); border-style:dashed; }
.numgrid .note { font-size:11.5px; color:var(--ink-faint); }
.subhead { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--brand); font-weight:700; margin:14px 0 4px; padding-top:10px; border-top:1px dashed var(--line-2); }
.subhead:first-child { border-top:0; padding-top:0; margin-top:0; }
input.invalid, select.invalid { border-color:var(--block)!important; box-shadow:0 0 0 2px color-mix(in srgb, var(--block) 25%, transparent); }

.chip { display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:3px 9px; border-radius:11px; font-weight:600; white-space:nowrap; }
.chip::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.9; }
.chip.clear { color:var(--clear); background:var(--clear-bg); }
.chip.appr { color:var(--appr); background:var(--appr-bg); }
.chip.block { color:var(--block); background:var(--block-bg); }
.chip.na { color:var(--ink-faint); background:var(--surface-2); }

.sheet { display:grid; grid-template-columns:1fr 380px; gap:22px; align-items:start; }
.rail { position:sticky; top:74px; }
.verdict { border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); margin-bottom:18px; }
.verdict .top { padding:16px; color:#fff; }
.verdict.clear .top { background:var(--clear); }
.verdict.appr .top { background:linear-gradient(135deg,#b7791f,#9c5b17); }
.verdict .top .eyebrow { color:rgba(255,255,255,.8); }
.verdict .top .status { font-size:20px; font-weight:700; margin-top:2px; }
.verdict .reasons { background:var(--surface); border:1px solid var(--line); border-top:0; padding:10px 14px; }
.verdict .reasons ul { margin:6px 0 0; padding-left:0; list-style:none; }
.verdict .reasons li { display:flex; justify-content:space-between; gap:10px; font-size:12px; padding:4px 0; border-bottom:1px dotted var(--line); }
.verdict .reasons li:last-child { border-bottom:0; }

.blotter { background:var(--blotter-bg); color:#e9eff6; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
.blotter h3 { margin:0; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#8fa3bc; padding:12px 16px 8px; }
.blotter .lines { padding:4px 16px 14px; }
.bline { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.06); }
.bline .k { font-size:11.5px; color:#a7b6c9; }
.bline .v { font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:13.5px; color:#fff; }
.bline.total { border-top:1px solid rgba(255,255,255,.2); border-bottom:0; margin-top:4px; padding-top:8px; }
.bline.total .k { color:#fff; font-weight:600; }
.bline.pos .v { color:#7fd7c0; } .bline.neg .v { color:#ec9a95; } .bline .v.over { color:var(--brand-2); }

.table-wrap { width:100%; overflow-x:auto; }
table.grid { width:100%; border-collapse:collapse; background:transparent; }
table.grid th, table.grid td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); font-size:12.5px; white-space:nowrap; color:var(--ink); }
table.grid th { font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); background:color-mix(in srgb, var(--surface-2) 85%, transparent); position:sticky; top:0; }
table.grid tr:hover td { background:color-mix(in srgb, var(--surface-2) 60%, transparent); }
table.grid td.num { font-family:var(--mono); text-align:right; font-variant-numeric:tabular-nums; }
table.grid.center th, table.grid.center td { text-align:center; }
table.grid.center th:first-child, table.grid.center td:first-child { text-align:left; }
tr.clickable { cursor:pointer; }
tr.clickable:hover td { background:color-mix(in srgb, var(--brand) 10%, transparent); }
tr.row-expired td { background:color-mix(in srgb, var(--block) 12%, transparent); }
.sub-link { color:var(--brand); text-decoration:underline; font-weight:600; }
.status-pill { font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; padding:2px 8px; border-radius:10px; font-weight:600; }
.status-pill.draft { background:var(--surface-2); color:var(--ink-soft); }
.status-pill.submitted { background:var(--appr-bg); color:var(--appr); }
.status-pill.approved { background:var(--clear-bg); color:var(--clear); }
.status-pill.rejected { background:var(--block-bg); color:var(--block); }
.link-btn { background:none; border:0; color:var(--brand); padding:0; font-size:12.5px; text-decoration:underline; }
.comm-ico { font-size:20px; line-height:1; }

.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:18px; }
.kpi { background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-brd); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
.kpi .n { font-family:var(--mono); font-size:26px; font-weight:700; color:var(--ink); }
.kpi .l { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-top:2px; }
.kpi.clear .n { color:var(--clear); } .kpi.appr .n { color:var(--appr); } .kpi.block .n { color:var(--block); }
.bar { height:8px; border-radius:4px; background:var(--surface-2); overflow:hidden; display:flex; min-width:120px; }
.bar > span { height:100%; }
.bar .b-appr { background:var(--clear); } .bar .b-rej { background:var(--block); } .bar .b-pend { background:var(--steel); }

.auth-screen { min-height:100vh; display:grid; place-items:center; background:radial-gradient(1200px 500px at 50% -10%,#1d4d80,var(--navy-deep)); padding:20px; }
.auth-card { width:100%; max-width:390px; background:var(--surface); border-radius:8px; box-shadow:0 24px 70px rgba(0,0,0,.45); overflow:hidden; }
.auth-card .head { background:var(--navy); padding:22px 24px; border-bottom:3px solid var(--brand-2); color:#fff; }
.auth-card .head .tagline { color:#9fb6d0; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; margin-top:8px; }
.auth-card .body { padding:22px 24px 26px; }
.auth-card label { display:block; font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-soft); margin:14px 0 5px; }
.auth-card input { width:100%; padding:10px 12px; border:1px solid var(--line-2); border-radius:var(--radius); font-size:14px; background:var(--surface); color:var(--ink); }
.auth-card input:focus { border-color:var(--brand); }
.auth-card .btn { width:100%; margin-top:20px; padding:11px; }
.auth-err { background:var(--block-bg); color:var(--block); font-size:12.5px; padding:9px 11px; border-radius:var(--radius); margin-top:14px; border:1px solid var(--block); }

.modal-backdrop { position:fixed; inset:0; background:rgba(10,20,32,.55); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); display:grid; place-items:center; z-index:90; padding:20px; }
.modal { background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-brd); border-radius:10px; width:100%; max-width:460px; box-shadow:0 24px 70px rgba(0,0,0,.4); max-height:90vh; overflow:auto; }
.modal.wide { max-width:820px; }
.modal .m-head { padding:16px 20px; border-bottom:1px solid var(--glass-brd); font-weight:600; color:var(--ink); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.modal .m-body { padding:18px 20px; }
.modal .m-foot { padding:14px 20px; border-top:1px solid var(--glass-brd); display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }
.modal label { display:block; font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); margin:12px 0 5px; }
.modal input, .modal select, .modal textarea { width:100%; padding:9px 11px; border:1px solid var(--line-2); border-radius:var(--radius); font-size:13px; background:var(--surface); color:var(--ink); font-family:inherit; }
.hint { font-size:11.5px; color:var(--ink-faint); margin-top:6px; }

.toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--navy); color:#fff; padding:11px 18px; border-radius:var(--radius); font-size:13px; opacity:0; pointer-events:none; transition:all .25s ease; z-index:100; box-shadow:var(--shadow); border-left:3px solid var(--brand-2); max-width:92vw; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err { border-left-color:var(--block); } .toast.ok { border-left-color:var(--clear); }

.empty { text-align:center; color:var(--ink-faint); padding:48px 20px; }
.banner-warn { background:var(--appr-bg); border:1px solid var(--appr); color:var(--appr); padding:10px 14px; border-radius:var(--radius); font-size:12.5px; margin-bottom:16px; }
.actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:4px; }
.override-panel { margin-top:10px; padding:10px 12px; background:var(--surface-2); border:1px dashed var(--brand); border-radius:var(--radius); }
.override-panel .eyebrow { color:var(--brand); }
.override-row { display:grid; grid-template-columns:1fr 130px; gap:8px; align-items:center; padding:3px 0; }
.override-row input { text-align:right; font-family:var(--mono); padding:5px 8px; border:1px solid var(--line-2); border-radius:var(--radius); width:100%; background:var(--surface); color:var(--ink); }

/* KYC form */
.kyc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.kyc-field { display:flex; flex-direction:column; gap:4px; }
.kyc-field label { font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); }
.kyc-field input, .kyc-field select, .kyc-field textarea { padding:7px 9px; border:1px solid var(--line-2); border-radius:var(--radius); font-size:13px; background:var(--surface); color:var(--ink); font-family:inherit; width:100%; }
.kyc-check { display:flex; align-items:center; gap:8px; font-size:12.5px; padding:4px 0; color:var(--ink); }
.kyc-check input { width:auto; }
.section-band { background:var(--navy-mid); color:#fff; font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; padding:7px 12px; border-radius:var(--radius); margin:6px 0 12px; }
.kyc-banner { padding:10px 14px; border-radius:var(--radius); margin-bottom:14px; border:1px solid var(--glass-brd); }
.kyc-banner.valid { background:var(--clear-bg); } .kyc-banner.expired, .kyc-banner.rejected { background:var(--block-bg); } .kyc-banner.pending { background:var(--appr-bg); }
.file-upload { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.file-upload input[type=file] { display:none; }
.file-upload .fname { font-size:12.5px; color:var(--ink-soft); }

/* Trade drill-down cards */
.trade-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:12px; }
.trade-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:12px 13px; cursor:pointer; transition:transform .12s ease, box-shadow .12s ease; box-shadow:var(--shadow); }
.trade-card:hover { transform:translateY(-2px); box-shadow:0 8px 26px rgba(15,28,45,.18); border-color:var(--brand); }
.tc-top { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.tc-ref { font-family:var(--mono); font-size:12px; color:var(--ink-soft); }
.tc-title { font-weight:600; font-size:13px; margin:8px 0 6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink); }
.tc-meta { display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-soft); }
.tc-meta .arrow { color:var(--brand); font-weight:700; }
.tc-foot { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
.tc-profit { font-family:var(--mono); font-size:12.5px; font-weight:600; }
.tc-profit.pos { color:var(--clear); } .tc-profit.neg { color:var(--block); }

/* Trade detail popup */
.td-detail { display:grid; gap:16px; margin-top:14px; }
.td-sec .eyebrow { margin-bottom:8px; }
.kv-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:8px 18px; }
.kv { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:4px 0; border-bottom:1px dotted var(--line); }
.kvl { font-size:12px; color:var(--ink-soft); }
.kvv { font-size:12.5px; color:var(--ink); font-weight:600; }

/* Responsive */
@media (max-width:1000px){ .sheet { grid-template-columns:1fr; } .rail { position:static; } .kyc-grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:760px){
  .sidebar { transform:translateX(-100%); width:var(--rail-w-open); transition:transform .2s ease; }
  .sidebar.open { transform:translateX(0); box-shadow:6px 0 24px rgba(0,0,0,.35); }
  .sidebar .sidebar-labels, .sidebar .nav-label { opacity:1; }
  .main { margin-left:0; }
  .hamburger { display:inline-flex; }
  .backdrop-nav.show { display:block; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:55; }
  .um-name, .role-chip, .icon-btn .lbl { display:none; }
  .wrap { padding:16px 14px 70px; }
  .row { grid-template-columns:1fr; gap:4px; }
  .numgrid { grid-template-columns:1fr; gap:4px; } .numgrid .note { display:none; }
  .kyc-grid { grid-template-columns:1fr; }
  .page-head h1 { font-size:19px; }
  .modal, .modal.wide { max-width:100%; }
}

/* Restore classes referenced by JS that CSS-rewrite dropped */
.ico { display:inline-flex; }
.modal-close { position:absolute; top:10px; right:12px; background:transparent; border:0; color:var(--ink-soft); font-size:22px; line-height:1; cursor:pointer; padding:4px 8px; border-radius:var(--radius); z-index:1; }
.modal-close:hover { background:var(--surface-2); color:var(--ink); }
.trade-modal { position:relative; max-width:900px; width:100%; padding:0; }
.trade-modal .wrap { padding:22px 26px 24px; max-width:none; }
.trade-modal .card { margin-bottom:14px; }

/* Required-field highlight (blocks submit until filled) */
.field-error, input.field-error, select.field-error, textarea.field-error {
  border-color:var(--block)!important;
  box-shadow:0 0 0 2px color-mix(in srgb, var(--block) 25%, transparent);
  background:color-mix(in srgb, var(--block) 6%, var(--surface))!important;
}

/* KYC file upload */
.upload-zone { display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:12px 14px; border:1.5px dashed var(--line-2); border-radius:var(--radius); background:color-mix(in srgb, var(--surface-2) 60%, transparent); margin-top:6px; }
.upload-zone.needed { border-color:var(--block); background:color-mix(in srgb, var(--block) 8%, var(--surface)); }
.file-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.file-chip { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); font-size:12px; color:var(--ink); }
.file-chip a { color:var(--brand); text-decoration:none; }
.file-chip a:hover { text-decoration:underline; }
.file-chip .rm { color:var(--block); cursor:pointer; font-weight:700; margin-left:4px; }
.file-chip .rm:hover { color:#8a2828; }

/* glass modifier (extra tint over base .card) */
.card.glass, .modal.glass, .kpi.glass { background:var(--glass); }

(function (root) {

  function makeEngine(RULES){
    var amount=toMap(RULES.transactionAmount), tenor=toMap(RULES.tenor), presold=toMap(RULES.goodsPreSold),
        pterms=toMap(RULES.purchaseTerms), sterms=toMap(RULES.salesTerms), hedge=toMap(RULES.hedging), ccy=toMap(RULES.ccyRisk);
    var APPROVAL = { 'Explicit Approval Required':1, 'Mgmt. Approval Required':1, 'No or Expired KYC':1 };
    var LABELS = { supplierKyc:'Supplier KYC', buyerKyc:'Buyer KYC', commodity:'Commodity', subCommodity:'Sub-Commodity',
      originCountry:'Country of Origin', loadingCountry:'Loading Country', destinationCountry:'Destination Country',
      transactionAmount:'Transaction Amount', transactionTenor:'Transaction Tenor', goodsPreSold:'Goods Pre-Sold',
      supplierPaymentTerms:'Supplier Payment Terms', buyerPaymentTerms:'Buyer Payment Terms',
      priceHedging:'Commodity Price Hedging', ccyRisk:'CCY Risk', profit:'Estimated Profit %' };

    function compute(i, overrides, ctx){
      i = i||{}; overrides = overrides||{}; ctx = ctx||{};
      var rules = {
        supplierKyc: ctx.supplierKyc!==undefined ? ctx.supplierKyc : lookup(RULES.suppliers, i.supplier),
        buyerKyc: ctx.buyerKyc!==undefined ? ctx.buyerKyc : lookup(RULES.buyers, i.buyer),
        commodity: lookup(RULES.commodities, i.commodity),
        subCommodity: lookup(RULES.subCommodities, i.subCommodity),
        originCountry: lookup(RULES.countries, i.originCountry),
        loadingCountry: lookup(RULES.countries, i.loadingCountry),
        destinationCountry: lookup(RULES.countries, i.destinationCountry),
        transactionAmount: lookup(amount, i.transactionAmount),
        transactionTenor: lookup(tenor, i.transactionTenor),
        goodsPreSold: lookup(presold, i.goodsPreSold),
        supplierPaymentTerms: lookup(pterms, i.supplierPaymentTerms),
        buyerPaymentTerms: lookup(sterms, i.buyerPaymentTerms),
        priceHedging: lookup(hedge, i.priceHedging),
        ccyRisk: lookup(ccy, i.ccyRisk)
      };
      var c = {};
      c.purchasePriceUsd = round(num(i.purchasePriceLcy)*num(i.purchaseFxRate));
      c.lmeBuy = round(c.purchasePriceUsd + num(i.purchasePremium));
      c.salesPriceUsd = round(num(i.salesPriceLcy)*num(i.salesFxRate));
      c.lmeSell = round(c.salesPriceUsd + num(i.salesPremium));
      c.commodityCost = c.lmeBuy;
      c.cashToCashTenor = days(i.startDate, i.endDate);
      var tf = c.cashToCashTenor/BASIS;
      c.groupEquityCost = round(num(i.equityContribution)*num(i.groupEquityCostPa)*c.lmeBuy*tf);
      c.financingContribution = round(1 - num(i.equityContribution));
      c.financingCost = round(c.financingContribution*num(i.financingCostPa)*c.lmeBuy*tf);
      c.insuranceCost = round(c.lmeSell*INSURANCE_RATE);
      c.equityFinIns = round(num(i.groupCostAllocation)+c.groupEquityCost+c.financingCost+num(i.generalBankCharges)+c.insuranceCost);
      c.totalCost = round(c.commodityCost+num(i.freightCost)+num(i.commissions)+num(i.otherExpenses)+c.equityFinIns);
      c.income = c.lmeSell; c.cost = c.totalCost;
      c.estProfit = round(c.income-c.cost);
      c.totalPbt = round(c.estProfit*num(i.quantityMT));
      c.profitPct = c.totalCost!==0 ? round((c.income-c.cost)/c.totalCost) : null;
      c.profitPctPa = (c.profitPct!==null && c.cashToCashTenor!==0) ? round((c.profitPct/c.cashToCashTenor)*BASIS) : null;
      c.totalIncome = round(num(i.quantityMT)*c.salesPriceUsd);
      c.equityReq = round(num(i.quantityMT)*c.lmeBuy*num(i.equityContribution));
      c.fundingLine = round(num(i.quantityMT)*c.lmeBuy*c.financingContribution);

<script>
'use strict';
/* Metals TRPS — single-page client.
   All computed/rule fields come from the server (/api/compute); the client
   never derives locked values itself. CSRF token is read from a cookie and
   echoed as a header on every mutating request. */

const state = { user: null, csrf: null, meta: null, view: 'trades', trade: null, editable: true, overrides: {} };
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

// ---- tiny DOM helper -------------------------------------------------------
function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k === 'text') el.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
    else if (k === 'dataset') for (const [dk, dv] of Object.entries(v)) el.dataset[dk] = dv;
    else el.setAttribute(k, v);
  }
  if (children != null) (Array.isArray(children) ? children : [children]).forEach((c) => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function getCookie(name) {
  return document.cookie.split(';').map((s) => s.trim()).filter((s) => s.startsWith(name + '=')).map((s) => decodeURIComponent(s.slice(name.length + 1)))[0] || null;
}
function toast(msg, kind) {
  toastEl.textContent = msg;
  toastEl.className = 'toast show ' + (kind || '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toastEl.className = 'toast'; }, 3200);
}
const fmt = {
  money(n) { return n == null ? '—' : Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); },
  pct(n) { return n == null ? '—' : (Number(n) * 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%'; },
  num(n) { return n == null ? '—' : Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 }); },
};

// ---- Brand mark + icons (inline SVG, adapt via currentColor) -----------
const ICONS = {
  screening: '<rect x="4" y="4" width="16" height="16" rx="1.5"/><path d="M12 9v6M9 12h6"/>',
  trades: '<path d="M4 6h16M4 12h16M4 18h10"/>',
  approvals: '<circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/>',
  counterparties: '<path d="M16 20v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"/><circle cx="9.5" cy="8" r="3.2"/><path d="M21 20v-1a4 4 0 0 0-3-3.87M16 4.2a3.5 3.5 0 0 1 0 6.8"/>',
  summary: '<path d="M3 21h18"/><path d="M6 21V10M12 21V4M18 21V14"/>',
  admin: '<circle cx="15" cy="6" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="14" cy="18" r="2"/><path d="M4 6h9M17 6h3M4 12h3M11 12h9M4 18h8M16 18h4"/>',
  logout: '<path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3M10 17l-5-5 5-5M5 12h11"/>',
  menu: '<path d="M4 7h16M4 12h16M4 17h16"/>',
  sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/>',
  moon: '<path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/>',
  autotheme: '<circle cx="12" cy="12" r="9"/><path d="M12 3v18z" fill="currentColor"/>',
};
function svgIcon(key, size) { size = size || 22; return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[key] || '') + '</svg>'; }
function iconEl(key, size) { return h('span', { class: 'ico', html: svgIcon(key, size) }); }
function brandSVG(size) { size = size || 28; return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"><polygon points="20,3 34,11 34,29 20,37 6,29 6,11"/><path d="M13 14l6 6-6 6"/><path d="M20 14l6 6-6 6" opacity="0.55"/></svg>'; }

// ---- Theme (system by default; manual Auto/Light/Dark) -----------------
function currentTheme() { try { return localStorage.getItem('trps.theme') || 'auto'; } catch (e) { return 'auto'; } }
function applyTheme(t) { if (t === 'auto') document.documentElement.removeAttribute('data-theme'); else document.documentElement.setAttribute('data-theme', t); }
function themeGlyph() { const t = currentTheme(); return t === 'light' ? 'sun' : t === 'dark' ? 'moon' : 'autotheme'; }
function themeLabel() { const t = currentTheme(); return t === 'light' ? 'Light' : t === 'dark' ? 'Dark' : 'Auto'; }
function cycleTheme() {
  const order = ['auto', 'light', 'dark']; let t = order[(order.indexOf(currentTheme()) + 1) % 3];
  try { localStorage.setItem('trps.theme', t); } catch (e) {}
  applyTheme(t);
  const b = document.getElementById('theme-btn'); if (b) b.innerHTML = svgIcon(themeGlyph(), 16) + '<span>' + themeLabel() + '</span>';
}
applyTheme(currentTheme());

// ---- Sidebar (mobile drawer) ------------------------------------------
function toggleNav() { const s = document.getElementById('sidebar'); const b = document.getElementById('nav-backdrop'); if (!s) return; const open = s.classList.contains('open'); s.classList.toggle('open', !open); if (b) b.classList.toggle('show', !open); }
function closeNav() { const s = document.getElementById('sidebar'); const b = document.getElementById('nav-backdrop'); if (s) s.classList.remove('open'); if (b) b.classList.remove('show'); }
function pageTitle() { return ({ screening: 'New Screening', trades: 'Trades', approvals: 'Approvals', counterparties: 'Counterparties', summary: 'Product Summary', admin: 'Administration' })[state.view] || 'TRPS'; }

// ---- Auto reference: User / Commodity / Sub-Commodity / date -----------
function recomputeReference() {
  const g = (f) => { const el = document.querySelector('[data-field="' + f + '"]'); return el && el.value ? el.value : ''; };
  const user = g('user') || (state.user && (state.user.username || state.user.displayName)) || '';
  const commodity = g('commodity') || '—';
  const sub = g('subCommodity') || '—';
  const ref = [user || '—', commodity, sub, state._refDate || new Date().toISOString().slice(0, 10)].join('/');
  const el = document.getElementById('auto-ref'); if (el) el.value = ref;
}

// ---- API wrapper -----------------------------------------------------------


// ---- bootstrap -------------------------------------------------------------


async function loadMetaAndRender() {
  if (!state.meta) state.meta = await api('GET', '/api/meta');
  renderShell();
}

// ---- Login -----------------------------------------------------------------
function renderLogin() {
  clear(app);
  const err = h('div', { class: 'auth-err', style: 'display:none' });
  const username = h('input', { type: 'text', autocomplete: 'username', autofocus: true });
  const password = h('input', { type: 'password', autocomplete: 'current-password' });
  async function submit() {
    err.style.display = 'none';
    try {
      const r = await api('POST', '/api/auth/login', { username: username.value, password: password.value });
      state.user = r.user; state.csrf = r.csrfToken;
      if (r.mustChangePassword) return openPasswordModal(true);
      await loadMetaAndRender();
    } catch (e) { err.textContent = e.message || 'Login failed'; err.style.display = 'block'; }
  }
  const form = h('div', { class: 'auth-card' }, [
    h('div', { class: 'logo-band' }, h('img', { src: KRG_LOGO, alt: 'Konexus Resources Group', class: 'krg-logo' })),
    h('div', { class: 'head' }, [
      h('span', { class: 'brandmark', html: brandSVG(30) + '<span class="wm">KRG&nbsp;<b>TRPS</b></span>' }),
      h('div', { class: 'tagline' }, 'Konexus Resources Group · Risk & Profitability Screening'),
    ]),
    h('div', { class: 'body' }, [
      h('label', {}, 'Username'), username,
      h('label', {}, 'Password'), password,
      err,
      h('button', { class: 'btn primary', onclick: submit }, 'Sign in'),
    ]),
  ]);
  password.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  username.addEventListener('keydown', (e) => { if (e.key === 'Enter') password.focus(); });
  app.appendChild(h('div', { class: 'auth-screen' }, form));
}

// ---- Password change modal -------------------------------------------------
function openPasswordModal(forced) {
  const cur = h('input', { type: 'password', autocomplete: 'current-password' });
  const nw = h('input', { type: 'password', autocomplete: 'new-password' });
  const cf = h('input', { type: 'password', autocomplete: 'new-password' });
  const err = h('div', { class: 'auth-err', style: 'display:none' });
  const backdrop = h('div', { class: 'modal-backdrop' });
  async function submit() {
    err.style.display = 'none';
    if (nw.value !== cf.value) { err.textContent = 'New passwords do not match'; err.style.display = 'block'; return; }
    try {
      await api('POST', '/api/auth/change-password', { currentPassword: cur.value, newPassword: nw.value });
      if (state.user) state.user.mustChangePassword = false;
      backdrop.remove(); toast('Password changed', 'ok');
      await loadMetaAndRender();
    } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
  }
  backdrop.appendChild(h('div', { class: 'modal' }, [
    h('div', { class: 'm-head' }, forced ? 'Set a new password to continue' : 'Change password'),
    h('div', { class: 'm-body' }, [
      forced ? h('div', { class: 'banner-warn' }, 'Your account uses a temporary password. Choose a new one to continue.') : null,
      h('label', {}, 'Current password'), cur,
      h('label', {}, 'New password'), nw,
      h('div', { class: 'hint' }, 'At least 12 characters with upper, lower, digit and symbol.'),
      h('label', {}, 'Confirm new password'), cf,

function cpOptionNames(kind) { return (state.counterparties || []).filter((c) => c.kind === kind || c.kind === 'Both').map((c) => c.fullLegalName); }
function optionList(sourceKey) {
  if (sourceKey === '@supplier') return cpOptionNames('Supplier');
  if (sourceKey === '@buyer') return cpOptionNames('Buyer');
  if (sourceKey === '@subCommodity') { const c = getVal('commodity'); return (state.meta.subCommoditiesByCommodity[c] || []); }
  if (sourceKey === '@loadPort') { const c = getVal('loadingCountry'); return (state.meta.portsByCountry[c] || []); }
  if (sourceKey === '@destinationPort') { const c = getVal('destinationCountry'); return (state.meta.portsByCountry[c] || []); }
  return state.meta[sourceKey] || [];
}

function selectEl(field, sourceKey, current) {
  const sel = h('select', { dataset: { field, input: '1' } });
  sel.appendChild(h('option', { value: '' }, '— select —'));
  const opts = optionList(sourceKey);
  if (current && opts.indexOf(current) < 0) sel.appendChild(h('option', { value: current, selected: 'selected' }, current));
  for (const opt of opts) sel.appendChild(h('option', { value: opt, selected: opt === current ? 'selected' : null }, opt));
  return sel;
}

function frameworkRow([field, label, sourceKey, ruleKey], data) {
  const sel = selectEl(field, sourceKey, data[field]);
  const chip = ruleKey ? h('span', { class: 'chip na', dataset: { rule: ruleKey } }, '—') : h('span', { class: 'chip na' }, 'info');
  sel.addEventListener('change', () => onFieldChange(field));
  return h('div', { class: 'row' }, [ h('label', {}, label), h('div', { class: 'field' }, sel), chip ]);
}

function budgetRow([field, label, kind], data) {
  let input;
  if (kind === 'lock') {
    input = h('input', { type: 'text', readonly: 'readonly', class: 'locked', dataset: { locked: field }, value: '' });
  } else if (kind === 'date') {
    input = h('input', { type: 'date', dataset: { field, input: '1' }, value: data[field] || '' });
    input.addEventListener('change', () => onFieldChange(field));
  } else if (kind && kind.startsWith('sel:')) {
    input = selectEl(field, kind.slice(4), data[field]);
    input.addEventListener('change', () => onFieldChange(field));
  } else {
    input = h('input', { type: 'number', step: 'any', dataset: { field, input: '1' }, value: data[field] != null ? data[field] : '' });
    input.addEventListener('input', () => onFieldChange(field));
  }
  const note = kind === 'lock' ? h('span', { class: 'note' }, h('span', { class: 'locked-tag' }, 'auto')) : h('span', { class: 'note' });
  return h('div', { class: 'numgrid' }, [ h('label', {}, label), h('div', { class: 'field' }, input), note ]);
}

function getVal(field) {
  const el = document.querySelector(`[data-field="${field}"]`);
  return el ? el.value : '';
}

function collectInput() {
  const input = {};
  document.querySelectorAll('[data-input="1"]').forEach((el) => {
    const f = el.dataset.field; const v = el.value;
    if (v === '' || v == null) return;
    if (el.type === 'number') { const n = parseFloat(v); if (Number.isFinite(n)) input[f] = n; }
    else input[f] = v;
  });
  return input;
}

let computeTimer = null;
function onFieldChange(field) {
  // Repopulate dependent dropdowns when their parent changes.
  if (field === 'commodity') repopulate('subCommodity', '@subCommodity');
  if (field === 'loadingCountry') repopulate('loadPort', '@loadPort');
  if (field === 'destinationCountry') repopulate('destinationPort', '@destinationPort');
  recomputeReference();
  clearTimeout(computeTimer);
  computeTimer = setTimeout(runCompute, 280);
}
function repopulate(field, sourceKey) {
  const sel = document.querySelector(`[data-field="${field}"]`);
  if (!sel) return;
  const prev = sel.value; clear(sel);
  sel.appendChild(h('option', { value: '' }, '— select —'));
  for (const opt of optionList(sourceKey)) sel.appendChild(h('option', { value: opt, selected: opt === prev ? 'selected' : null }, opt));
}

async function runCompute() {
  const input = collectInput();
  try {
    const r = await api('POST', '/api/compute', { input, overrides: state.user.role === 'admin' ? state.overrides : undefined });
    paintResults(r);
  } catch (e) { /* validation errors are non-fatal for live preview */ }
}

function chipClass(status) {
  if (status === 'No Explicit Approval Required' || status === 'Valid KYC In Place') return 'clear';
  if (status === 'Explicit Approval Required' || status === 'Mgmt. Approval Required') return 'appr';
  if (status === 'No or Expired KYC') return 'block';
  return 'na';
}

function paintResults(r) {
  // Rule chips
  document.querySelectorAll('[data-rule]').forEach((chip) => {
    const key = chip.dataset.rule; const status = r.rules[key];
    chip.className = 'chip ' + chipClass(status);
    chip.textContent = status || '—';
  });
  // Locked fields
  document.querySelectorAll('[data-locked]').forEach((inp) => {
    const key = inp.dataset.locked; const val = r.computed[key];
    inp.value = val == null ? '—' : (key === 'financingContribution' || key === 'profitPct' ? fmt.pct(val) : fmt.money(val));
    if (r.verdict.appliedOverrides && r.verdict.appliedOverrides[key]) inp.classList.add('over'); else inp.classList.remove('over');
  });
  paintVerdict(r);
  paintBlotter(r);
}

function paintVerdict(r) {
  const box = document.getElementById('verdict'); if (!box) return;
  clear(box);
  const appr = r.verdict.status !== 'CLEAR';
  box.className = 'verdict ' + (appr ? 'appr' : 'clear');
  box.appendChild(h('div', { class: 'top' }, [
    h('div', { class: 'eyebrow' }, 'Screening verdict'),
    h('div', { class: 'status' }, appr ? 'Approval required' : 'Clear to proceed'),

  if (appr) {
    box.appendChild(h('div', { class: 'reasons' }, [
      h('div', { class: 'eyebrow' }, `${r.verdict.reasons.length} flag${r.verdict.reasons.length === 1 ? '' : 's'}`),
      h('ul', {}, r.verdict.reasons.map((x) => h('li', {}, [
        h('span', {}, x.label),
        h('span', { class: 'chip ' + chipClass(x.status) }, x.status),
      ]))),
    ]));
  }
}

function blLine(k, v, cls) { return h('div', { class: 'bline ' + (cls || '') }, [ h('span', { class: 'k' }, k), h('span', { class: 'v' }, v) ]); }

function paintBlotter(r) {
  const bl = document.getElementById('blotter'); if (!bl) return;
  const c = r.computed;
  clear(bl);
  bl.appendChild(h('h3', {}, 'Summary P&L (USD)'));
  const profitCls = c.estProfit == null ? '' : (c.estProfit >= 0 ? 'pos' : 'neg');
  bl.appendChild(h('div', { class: 'lines' }, [
    blLine('Cash-to-cash tenor', c.cashToCashTenor != null ? c.cashToCashTenor + ' days' : '—'),
    blLine('Income / MT', fmt.money(c.income)),
    blLine('Cost / MT', fmt.money(c.cost)),
    blLine('Est. profit / MT', fmt.money(c.estProfit), profitCls),
    blLine('Est. profit %', fmt.pct(c.profitPct), profitCls),
    blLine('Est. profit % p.a.', fmt.pct(c.profitPctPa)),
    blLine('Total income', fmt.money(c.totalIncome)),
    blLine('Total PBT on trade', fmt.money(c.totalPbt), 'total ' + profitCls),
    h('h3', { style: 'padding-left:0;padding-top:14px' }, 'Treasury requirement'),
    blLine('Equity', fmt.money(c.equityReq)),
    blLine('Funding line', fmt.money(c.fundingLine)),
    blLine('Capital lock-up', c.capitalLockup != null ? fmt.num(c.capitalLockup) + ' days' : '—'),
  ]));
}

async function renderScreening(v, existing) {
  try { state.counterparties = (await api('GET', '/api/counterparties')).counterparties; } catch (_) { state.counterparties = state.counterparties || []; }
  const data = existing ? existing.input : {};
  state.overrides = existing && existing.overrides ? { ...existing.overrides } : {};
  const editable = existing ? state.editable : true;

  const summaryCard = h('div', { class: 'card' }, [
    h('div', { class: 'card-head' }, [ h('h2', {}, 'Transaction Summary') ]),
    h('div', { class: 'card-body' }, [
      h('div', { class: 'row' }, [ h('label', {}, 'User'), h('div', { class: 'field' }, (function(){ const inp = h('input', { type: 'text', dataset: { field: 'user', input: '1' }, value: data.user || state.user.username || state.user.displayName }); inp.addEventListener('input', function(){ onFieldChange('user'); }); return inp; })()), h('span') ]),
      h('div', { class: 'row' }, [ h('label', {}, 'Reference / Title'), h('div', { class: 'field' }, h('input', { type: 'text', readonly: 'readonly', class: 'locked', id: 'auto-ref', dataset: { field: 'title', input: '1' }, value: data.title || '' })), h('span', { class: 'note' }, h('span', { class: 'locked-tag' }, 'auto')) ]),
    ]),
  ]);

  const frameworkCard = h('div', { class: 'card' }, [
    h('div', { class: 'card-head' }, [ h('h2', {}, 'Risk Management Framework') ]),
    h('div', { class: 'card-body' }, FRAMEWORK.map((row) => frameworkRow(row, data))),
  ]);

  const budgetCard = h('div', { class: 'card' }, [
    h('div', { class: 'card-head' }, [ h('h2', {}, 'Transaction Budget') ]),
    h('div', { class: 'card-body' }, [
      h('div', { class: 'subhead' }, 'Buy side'),
      ...BUY.map((row) => budgetRow(row, data)),
      h('div', { class: 'subhead' }, 'Sell side'),
      ...SELL.map((row) => budgetRow(row, data)),
      h('div', { class: 'subhead' }, 'Transaction costs'),
      ...COSTS.map((row) => budgetRow(row, data)),
    ]),
  ]);

  const verdict = h('div', { class: 'verdict clear', id: 'verdict' });

  const head = h('div', { class: 'page-head' }, [
    h('div', {}, [ h('div', { class: 'eyebrow' }, existing ? existing.ref : 'New screening'),
      h('h1', {}, existing ? (existing.input.title || existing.ref) : 'Transaction Screening'),
      h('div', { class: 'lead' }, 'Enter the trade. Rule results and locked figures are computed on the server.') ]),

  v.appendChild(head);

function setReadonlyForm() {
  document.querySelectorAll('[data-input="1"]').forEach((el) => { el.setAttribute('disabled', 'disabled'); });
}

function buildActions(container, existing, editable) {
  clear(container);
  const role = state.user.role;
  if (editable) {
    container.appendChild(h('button', { class: 'btn primary', onclick: () => saveTrade(existing, false) }, existing ? 'Save changes' : 'Save draft'));
    container.appendChild(h('button', { class: 'btn brass', onclick: () => saveTrade(existing, true) }, 'Save & submit for approval'));
  }
  if (existing && (role === 'admin' || role === 'approver') && existing.status === 'submitted') {
    container.appendChild(h('button', { class: 'btn patina', onclick: () => decide(existing, 'approved') }, 'Approve'));
    container.appendChild(h('button', { class: 'btn oxide', onclick: () => decide(existing, 'rejected') }, 'Reject'));
  }
}

function adminOverridePanel(existing) {
  if (state.user.role !== 'admin') return null;
  const panel = h('div', { class: 'override-panel' }, [ h('div', { class: 'eyebrow' }, 'Admin overrides (locked fields)') ]);
  const fields = [...LOCKED_FIELDS];
  fields.forEach((f) => {
    const inp = h('input', { type: 'number', step: 'any', placeholder: 'auto', value: state.overrides[f] != null ? state.overrides[f] : '' });
    inp.addEventListener('input', () => {
      const val = inp.value; if (val === '') delete state.overrides[f]; else state.overrides[f] = parseFloat(val);
      clearTimeout(computeTimer); computeTimer = setTimeout(runCompute, 280);
    });
    panel.appendChild(h('div', { class: 'override-row' }, [ h('label', { style: 'text-transform:none;letter-spacing:0;font-size:11.5px;margin:0' }, f), inp ]));
  });
  return panel;
}

function requiredScreeningFields() {
  const req = ['user'];
  FRAMEWORK.forEach((r) => req.push(r[0]));
  [...BUY, ...SELL, ...COSTS].forEach((r) => { if (r[2] !== 'lock') req.push(r[0]); });
  return req;
}
function clearFieldErrors() { document.querySelectorAll('.field-error').forEach((el) => el.classList.remove('field-error')); }
function validateRequiredScreening() {
  clearFieldErrors();
  const missing = [];
  requiredScreeningFields().forEach((f) => {
    const el = document.querySelector('[data-field="' + f + '"]');
    if (!el) return;
    const val = (el.value == null ? '' : String(el.value)).trim();
    if (val === '') {
      el.classList.add('field-error');
      const off = () => { el.classList.remove('field-error'); el.removeEventListener('input', off); el.removeEventListener('change', off); };
      el.addEventListener('input', off); el.addEventListener('change', off);
      missing.push(f);
    }
  });
  return missing;
}
async function saveTrade(existing, submit) {
  if (submit) {
    const missing = validateRequiredScreening();
    if (missing.length) {
      toast('Please complete all ' + missing.length + ' highlighted field' + (missing.length > 1 ? 's' : '') + ' before submitting.', 'err');
      const first = document.querySelector('.field-error'); if (first && first.scrollIntoView) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }
  const input = collectInput();
  const payload = { input };
  if (state.user.role === 'admin') payload.overrides = state.overrides;
  try {
    let trade;
    if (existing) { const r = await api('PUT', '/api/trades/' + existing.id, payload); trade = r.trade; }
    else { const r = await api('POST', '/api/trades', payload); trade = r.trade; }
    if (submit) { await api('POST', '/api/trades/' + trade.id + '/submit'); toast('Trade submitted for approval', 'ok'); }
    else toast('Saved', 'ok');
    openTrade(trade.id);
  } catch (e) {
    if (e.data && e.data.details) toast(e.data.details[0], 'err'); else toast(e.message || 'Save failed', 'err');
  }
}

async function decide(existing, decision) {
  let note = null;
  if (decision === 'rejected') { note = prompt('Reason for rejection (optional):') || null; }
  try {
    await api('POST', '/api/trades/' + existing.id + '/decide', { decision, note });
    toast('Trade ' + decision, 'ok');
    navigate(state.view === 'approvals' ? 'approvals' : 'trades');
  } catch (e) { toast(e.message || 'Action failed', 'err'); }
}

async function openTrade(id) {
  try {
    const r = await api('GET', '/api/trades/' + id);
    document.querySelectorAll('.trade-modal-backdrop').forEach((b) => b.remove());
    state.trade = r.trade; state.editable = r.editable;
    const inner = h('div', { class: 'wrap' });
    const backdrop = h('div', { class: 'modal-backdrop trade-modal-backdrop' });
    const modal = h('div', { class: 'modal glass trade-modal' }, [
      h('button', { class: 'modal-close', title: 'Close', onclick: () => backdrop.remove() }, '\u00d7'),
      inner,
    ]);
    backdrop.appendChild(modal);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
    app.appendChild(backdrop);
    renderTradeDetail(inner, r.trade, r.editable, backdrop);
  } catch (e) { toast(e.message, 'err'); }
}

function tdKV(label, value) { return h('div', { class: 'kv' }, [h('span', { class: 'kvl' }, label), h('span', { class: 'kvv mono' }, value)]); }
function renderTradeDetail(container, t, editable, backdrop) {
  clear(container);
  const inp = t.input || {}, c = t.computed || {}, rules = t.rules || {}, vd = t.verdict || {};
  container.appendChild(h('div', { class: 'page-head' }, [
    h('div', {}, [ h('div', { class: 'eyebrow' }, t.ref), h('h1', { style: 'font-size:18px' }, inp.title || 'Trade') ]),
    h('span', { class: 'status-pill ' + t.status }, t.status),
  ]));

// ---- Email delivery (EmailJS) ------------------------------------------
function emailConfigured() {
  const s = state.emailSettings || {};
  return !!(s.serviceId && s.templateId && s.publicKey);
}
function genPassword() {
  const U = 'ABCDEFGHJKLMNPQRSTUVWXYZ', L = 'abcdefghijkmnpqrstuvwxyz', D = '23456789', S = '!@#$%^&*?-+';
  const pick = (s) => s[Math.floor(Math.random() * s.length)];
  const all = U + L + D + S;
  let out = pick(U) + pick(L) + pick(D) + pick(S);
  for (let i = 0; i < 10; i++) out += pick(all);
  return out.split('').sort(() => Math.random() - 0.5).join('');
}
async function sendCredentialEmail(toEmail, toName, username, tempPassword) {
  const s = state.emailSettings || {};
  if (!s.serviceId || !s.templateId || !s.publicKey) return { ok: false, skipped: true, message: 'Email delivery is not configured' };
  const template_params = {
    to_email: toEmail, to_name: toName || username, username: username,
    temp_password: tempPassword, app_url: s.appUrl || '', login_url: s.appUrl || '', from_name: s.fromName || 'Metals TRPS',
  };
  try {
    const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ service_id: s.serviceId, template_id: s.templateId, user_id: s.publicKey, template_params }),
    });
    if (res.ok) return { ok: true };
    let t = ''; try { t = await res.text(); } catch (_) {}
    return { ok: false, message: t || ('HTTP ' + res.status) };
  } catch (e) { return { ok: false, message: (e && e.message) || 'Network error' }; }
}

function cpField(field, label, type, data) {
  const val = data ? (data[field] != null ? data[field] : '') : '';
  let inp;
  if (type && type.indexOf('select:') === 0) {
    const opts = type.slice(7).split(',');
    inp = h('select', { dataset: { cp: '1', field } }, [h('option', { value: '' }, '—')].concat(opts.map((o) => h('option', { value: o, selected: o === val ? 'selected' : null }, o))));
  } else if (type === 'date') {
    inp = h('input', { type: 'date', dataset: { cp: '1', field }, value: val });
  } else {
    inp = h('input', { type: 'text', dataset: { cp: '1', field }, value: val });
  }
  return h('div', { class: 'kyc-field' }, [h('label', {}, label), inp]);
}
function cpCheck(field, label, data) {
  const on = data && data[field];
  const inp = h('input', { type: 'checkbox', dataset: { cp: '1', field, cptype: 'check' } });
  if (on) inp.setAttribute('checked', 'checked');
  return h('label', { class: 'kyc-check' }, [inp, label]);
}
function collectCp() {
  const out = {};
  document.querySelectorAll('[data-cp="1"]').forEach((el) => {
    const f = el.dataset.field;
    if (el.dataset.cptype === 'check') out[f] = !!el.checked;
    else if (el.value !== '') out[f] = el.value;
  });
  return out;
}

      if (canDecide && c.status === 'submitted') acts.push(h('button', { class: 'btn sm patina', onclick: () => decideCp(c.id, 'approved') }, 'Approve'), h('button', { class: 'btn sm oxide', onclick: () => decideCp(c.id, 'reject') }, 'Reject'));
      return h('tr', { class: c.kycState === 'expired' ? 'row-expired' : '' }, [
        h('td', {}, h('button', { class: 'link-btn', onclick: () => openCounterparty(c.id) }, c.fullLegalName || '(unnamed)')),
        h('td', {}, c.countryOfIncorporation || '—'),
        h('td', {}, c.kind || '—'),
        h('td', {}, cpStatusChip(c)),
        h('td', {}, c.expiresAt ? new Date(c.expiresAt).toLocaleDateString() : '—'),
        h('td', {}, c.submittedByName || c.createdByName || '—'),
        h('td', {}, h('div', { class: 'actions' }, acts)),
      ]);
    });
    body.appendChild(h('div', { class: 'table-wrap' }, h('table', { class: 'grid center' }, [
      h('thead', {}, h('tr', {}, ['Legal name', 'Country', 'Relationship', 'KYC status', 'Valid until', 'Submitted by', 'Actions'].map((x) => h('th', {}, x)))),
      h('tbody', {}, rows),
    ])));
  } catch (e) { toast(e.message, 'err'); }
}

function kycStateOf(c) { if (c.status === 'rejected') return 'rejected'; if (c.status !== 'approved' || !c.approvedAt) return 'pending'; return (Date.now() > new Date(c.approvedAt).getTime() + 365 * 864e5) ? 'expired' : 'valid'; }
function cpStatusChip(c) {
  const st = c.kycState || kycStateOf(c);
  if (st === 'valid') return h('span', { class: 'chip clear' }, 'Valid KYC');
  if (st === 'expired') return h('span', { class: 'chip block' }, 'Expired — refresh');
  if (st === 'rejected') return h('span', { class: 'chip block' }, 'Rejected');
  return h('span', { class: 'chip appr' }, 'Pending approval');
}
async function decideCp(id, decision) {
  const dec = decision === 'reject' ? 'rejected' : decision;
  let note = null;
  if (dec === 'rejected') { note = prompt('Reason for rejection (optional):') || null; }
  try { await api('POST', '/api/counterparties/' + id + '/decide', { decision: dec, note }); toast('Counterparty ' + dec, 'ok'); navigate('counterparties'); }
  catch (e) { toast(e.message, 'err'); }
}
async function openCounterparty(id) {
  try { const r = await api('GET', '/api/counterparties/' + id); openCounterpartyForm(document.getElementById('view'), r.counterparty, r.editable, r.canDecide); }
  catch (e) { toast(e.message, 'err'); }
}

function statusBanner(c) {
  const st = kycStateOf(c);
  const cls = { valid: 'chip clear', expired: 'chip block', rejected: 'chip block', pending: 'chip appr' }[st] || 'chip na';
  const label = { valid: 'Valid KYC in place', expired: 'KYC expired — refresh & resubmit', rejected: 'Rejected', pending: 'Pending approval' }[st] || st;
  const bits = [h('span', { class: cls }, label)];
  if (c.approvedAt) bits.push(h('span', { class: 'hint' }, 'Approved ' + new Date(c.approvedAt).toLocaleDateString() + (c.approvedBy ? ' by ' + c.approvedBy : '') + ' · valid until ' + new Date(new Date(c.approvedAt).getTime() + 365 * 864e5).toLocaleDateString()));
  else if (c.submittedByName) bits.push(h('span', { class: 'hint' }, 'Submitted by ' + c.submittedByName));
  return h('div', { class: 'kyc-banner ' + st, style: 'display:flex;gap:12px;align-items:center;flex-wrap:wrap' }, bits);
}

function openCounterpartyForm(v, existing, editable, canDecide) {
  clear(v);
  const data = existing || {};
  const ro = existing ? (editable === false) : false;
  const band = (t) => h('div', { class: 'section-band' }, t);
  const grid = (nodes) => h('div', { class: 'kyc-grid' }, nodes);

  const relationship = h('div', { class: 'kyc-grid' }, [ cpField('kind', 'Relationship', 'select:Supplier,Buyer,Both', data) ]);
  const secA = grid(KYC_A.map((f) => cpField(f[0], f[1], f[2], data)));
  const secB = h('div', { class: 'kyc-grid' }, KYC_CONTACTS.map(([p, title]) =>
    h('div', {}, [h('div', { class: 'eyebrow', style: 'margin-bottom:6px' }, title)].concat(KYC_CFIELDS.map(([lbl, sfx]) => cpField(p + sfx, lbl, null, data))))));
  const secC = h('div', {}, [
    h('div', { class: 'kyc-grid' }, [ cpField('listedOnExchange', 'Listed on Stock Exchange?', 'select:Yes,No', data), cpField('exchangeName', 'Name of corporation listed', null, data), cpField('exchangeCodes', 'Exchange(s) & stock code(s)', null, data) ]),
    h('div', { class: 'eyebrow', style: 'margin:12px 0 6px' }, 'Ultimate Beneficiary Owners (name & %)'),

      h('div', { style: 'display:flex; gap:8px' }, [
        h('div', { class: 'kyc-field', style: 'flex:1' }, [h('label', {}, 'UBO ' + n), h('input', { type: 'text', dataset: { cp: '1', field: 'ubo' + n }, value: data['ubo' + n] || '' })]),
        h('div', { class: 'kyc-field', style: 'width:70px' }, [h('label', {}, '%'), h('input', { type: 'text', dataset: { cp: '1', field: 'uboPct' + n }, value: data['uboPct' + n] || '' })]),
      ]))),
  ]);
  const secD = grid(KYC_D.map((f) => cpField(f[0], f[1], f[2], data)));
  const secE = grid(KYC_E.map((f) => cpField(f[0], f[1], f[2], data)));
  const secF = h('div', { style: 'display:grid; grid-template-columns:repeat(2,1fr); gap:4px 20px' }, KYC_DOCS.map((d, i) => cpCheck('doc' + (i + 1), d, data)));

  // ---- Supporting documents (replaces the declaration) ----
  let files = (existing && Array.isArray(existing.documents)) ? existing.documents.slice() : [];
  const fileList = h('div', { class: 'file-list' });
  function renderFiles() {
    clear(fileList);
    if (!files.length) { fileList.appendChild(h('span', { class: 'hint' }, 'No files uploaded yet.')); return; }
    files.forEach((f, idx) => {
      fileList.appendChild(h('div', { class: 'file-chip' }, [
        f.data ? h('a', { href: f.data, download: f.name, target: '_blank' }, f.name) : h('span', {}, f.name),
        h('span', { class: 'hint' }, '(' + Math.round((f.size || 0) / 1024) + ' KB)'),
        ro ? null : h('span', { class: 'rm', title: 'Remove', onclick: () => { files.splice(idx, 1); renderFiles(); markUpload(); } }, '✕'),
      ]));
    });
  }
  function markUpload() { const z = document.getElementById('cp-upload'); if (z && files.length) z.classList.remove('needed'); }
  const fileInput = h('input', { type: 'file', multiple: 'multiple', style: 'display:none' });
  fileInput.addEventListener('change', () => {
    const fl = fileInput.files; let pending = fl.length; if (!pending) return;
    Array.prototype.forEach.call(fl, (file) => {
      if (file.size > 3 * 1024 * 1024) { toast('"' + file.name + '" exceeds 3 MB and was skipped', 'err'); if (!--pending) { renderFiles(); markUpload(); } return; }
      const reader = new FileReader();
      reader.onload = () => { files.push({ name: file.name, size: file.size, type: file.type, data: reader.result }); if (!--pending) { renderFiles(); markUpload(); } };
      reader.onerror = () => { if (!--pending) { renderFiles(); markUpload(); } };
      reader.readAsDataURL(file);
    });
    fileInput.value = '';
  });
  const uploadBtn = h('button', { class: 'btn', onclick: () => fileInput.click() }, '⬆ Upload file');
  if (ro) uploadBtn.setAttribute('disabled', 'disabled');
  const uploadZone = h('div', { class: 'upload-zone', id: 'cp-upload' }, [ uploadBtn, h('span', { class: 'hint' }, 'Attach supporting KYC documents (PDF, images, etc.). At least one file is required to submit.'), fileInput ]);

    try {
      if (existing) await api('PUT', '/api/counterparties/' + existing.id, payload);

    h('button', { class: 'btn', onclick: () => navigate('counterparties') }, '← Back'),

  v.appendChild(h('div', { class: 'card glass' }, h('div', { class: 'card-body' }, [
    existing ? statusBanner(existing) : null,
    approvalActions,
    band('Relationship'), relationship,
    band('A · Corporate Information'), secA,
    band('B · Contact Details'), secB,
    band('C · Other Details'), secC,
    band('D · Trading Summary'), secD,
    band('E · Bank Information'), secE,
    band('F · KYC Documentation Checklist'), secF,
    band('G · Supporting Documents'), uploadZone, fileList,
    err,
    h('div', { class: 'actions', style: 'margin-top:16px' }, ro ? [ h('div', { class: 'hint' }, 'Read-only. Use the amend option in verification to edit with password confirmation.') ] : [ h('button', { class: 'btn primary', onclick: save }, existing ? 'Save & resubmit' : 'Submit counterparty'), h('button', { class: 'btn', onclick: () => navigate('counterparties') }, 'Cancel') ]),
  ])));
  if (canDecide && existing) v.appendChild(verificationPanel(existing, ro));
  if (ro) document.querySelectorAll('[data-cp="1"]').forEach((el) => el.setAttribute('disabled', 'disabled'));
}

// ---- KYC verification (approver): entered vs reference, accept/reject ---
function verificationPanel(existing, roForm) {
  const fields = [['fullLegalName', 'Legal name'], ['regNumber', 'Registration number'], ['countryOfIncorporation', 'Country'], ['dateOfIncorporation', 'Date of incorporation'], ['registeredAddress', 'Registered address'], ['vatTaxNumber', 'VAT / Tax number']];
  const prev = (existing.verification && existing.verification.fields) || {};
  const refInputs = {};
  const rows = fields.map(([f, label]) => {
    const entered = existing[f] || '';
    const ref = h('input', { type: 'text', value: (prev[f] && prev[f].reference) || '', placeholder: 'value from registry / open source' });
    refInputs[f] = ref;
    const badge = h('span', { class: 'chip na' }, '—');
    const upd = () => { const rv = ref.value.trim(); if (!rv) { badge.className = 'chip na'; badge.textContent = '—'; } else if (rv === String(entered).trim()) { badge.className = 'chip clear'; badge.textContent = 'Match'; } else { badge.className = 'chip block'; badge.textContent = 'Differs'; } };
    ref.addEventListener('input', upd); setTimeout(upd, 0);
    return h('tr', {}, [ h('td', {}, label), h('td', {}, h('span', { class: 'mono' }, entered || '—')), h('td', {}, ref), h('td', {}, badge) ]);
  });
  async function saveVerification(manual) {
    const outFields = {}; fields.forEach(([f]) => { outFields[f] = { entered: existing[f] || '', reference: refInputs[f].value.trim() }; });
    try { await api('POST', '/api/counterparties/' + existing.id + '/verify', { source: 'manual', manual: !!manual, fields: outFields }); toast('Verification saved', 'ok'); }
    catch (e) { toast(e.message, 'err'); }
  }
  function manualAmend() {
    passwordGate('You are about to manually amend the entered KYC data. Re-enter your password to proceed.', () => {
      document.querySelectorAll('[data-cp="1"]').forEach((el) => el.removeAttribute('disabled'));
      toast('Password confirmed — edit the fields above and use “Save & resubmit”.', 'ok');
    });
  }
  return h('div', { class: 'card glass' }, [
    h('div', { class: 'card-head' }, [ h('h2', {}, 'KYC verification'), existing.verification ? h('span', { class: 'chip clear' }, 'checked ' + new Date(existing.verification.checkedAt).toLocaleDateString()) : h('span', { class: 'chip na' }, 'not checked') ]),
    h('div', { class: 'card-body' }, [
      h('div', { class: 'hint', style: 'margin-bottom:10px' }, 'Enter values found on the relevant company registry / open sources; differences are highlighted. Automated registry lookup (e.g. Companies House) connects on the server version.'),
      h('div', { class: 'table-wrap' }, h('table', { class: 'grid' }, [ h('thead', {}, h('tr', {}, ['Field', 'Entered', 'Reference', 'Result'].map((x) => h('th', {}, x)))), h('tbody', {}, rows) ])),
      h('div', { class: 'actions', style: 'margin-top:12px' }, [
        h('button', { class: 'btn primary', onclick: () => saveVerification(false) }, 'Save verification'),
        h('button', { class: 'btn', onclick: manualAmend }, '🔒 Manually amend data'),
      ]),
    ]),
  ]);
}

// ---- Password gate (re-enter password before manual data entry) --------
function passwordGate(actionLabel, onOk) {
  const pw = h('input', { type: 'password', autocomplete: 'current-password' });
  const err = h('div', { class: 'auth-err', style: 'display:none' });
  const backdrop = h('div', { class: 'modal-backdrop' });
  async function submit() {
    err.style.display = 'none';
    try { await api('POST', '/api/auth/verify-password', { password: pw.value }); backdrop.remove(); onOk(); }
    catch (e) { err.textContent = e.message; err.style.display = 'block'; }
  }
  backdrop.appendChild(h('div', { class: 'modal glass' }, [
    h('div', { class: 'm-head' }, 'Confirm your password'),
    h('div', { class: 'm-body' }, [ h('div', { class: 'hint' }, actionLabel), h('label', {}, 'Password'), pw, err ]),
    h('div', { class: 'm-foot' }, [ h('button', { class: 'btn', onclick: () => backdrop.remove() }, 'Cancel'), h('button', { class: 'btn primary', onclick: submit }, 'Confirm') ]),
  ]));
  app.appendChild(backdrop); pw.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); }); setTimeout(() => pw.focus(), 0);
}

/* ===================================================================
   PRODUCT SUMMARY (admin + approver) — icons, sub-commodity, drill-down
   =================================================================== */
const COMMODITY_ICON = { Aluminium: '🔩', Lead: '🧱', Copper: '🟠', Nickel: '🪙', Iron: '⛓️', Pulses: '🫘', Grains: '🌾', Oilseeds: '🌻', Nuts: '🥜', Coal: '⚫', Other: '📦' };
function commodityIcon(name) { return COMMODITY_ICON[name] || '📦'; }
function miniBar(s) {

}
async function renderProductSummary(v) {
  v.appendChild(h('div', { class: 'page-head' }, [
    h('div', {}, [ h('div', { class: 'eyebrow' }, 'Overview'), h('h1', {}, 'Product Summary'), h('div', { class: 'lead' }, 'Screenings per commodity and sub-commodity. Click a sub-commodity to review its trades.') ]),

      wrap.appendChild(h('div', { class: 'card glass' }, [
        h('div', { class: 'card-head' }, [
          h('h2', { style: 'display:flex;align-items:center;gap:10px;font-size:14px' }, [ h('span', { class: 'comm-ico' }, commodityIcon(row.commodity)), row.commodity ]),
          h('span', { class: 'chip na' }, row.total + ' screenings · ' + row.approved + ' approved'),
        ]),
        h('div', { class: 'card-body', style: 'padding:0' }, h('div', { class: 'table-wrap' }, h('table', { class: 'grid center' }, [
          h('thead', {}, h('tr', {}, ['Sub-commodity', 'Total', 'Approved', 'Not approved', 'Pending', 'Flagged', 'Mix'].map((x) => h('th', {}, x)))),
          h('tbody', {}, subRows),
        ]))),
      ]));
    });
  } catch (e) { toast(e.message, 'err'); }
}

async function openSubCommodityTrades(commodity, sub) {
  let trades = [];
  try { trades = (await api('GET', '/api/trades')).trades.filter((t) => t.commodity === commodity && (t.subCommodity || '(Unspecified)') === sub); }
  catch (e) { toast(e.message, 'err'); return; }
  const backdrop = h('div', { class: 'modal-backdrop' });
  const cards = trades.length ? trades.map((t) => h('div', { class: 'trade-card', onclick: () => { backdrop.remove(); openTrade(t.id); } }, [
    h('div', { class: 'tc-top' }, [ h('span', { class: 'tc-ref' }, t.ref), h('span', { class: 'status-pill ' + t.status }, t.status) ]),
    h('div', { class: 'tc-title' }, t.title || (commodity + ' / ' + sub)),
    h('div', { class: 'tc-meta' }, [ h('span', {}, t.supplier || '—'), h('span', { class: 'arrow' }, '→'), h('span', {}, t.buyer || '—') ]),
    h('div', { class: 'tc-foot' }, [
      h('span', { class: 'chip ' + (t.verdict === 'CLEAR' ? 'clear' : 'appr') }, t.verdict === 'CLEAR' ? 'Clear' : 'Approval req.'),
      h('span', { class: 'tc-profit ' + (t.estProfit != null && t.estProfit >= 0 ? 'pos' : 'neg') }, t.estProfit != null ? fmt.money(t.estProfit) + ' /MT' : '—'),
    ]),
  ])) : [h('div', { class: 'empty' }, 'No trades for this sub-commodity.')];
  backdrop.appendChild(h('div', { class: 'modal glass wide' }, [
    h('div', { class: 'm-head' }, [ h('span', { class: 'comm-ico' }, commodityIcon(commodity)), ' ' + commodity + ' · ' + sub ]),
    h('div', { class: 'm-body' }, h('div', { class: 'trade-cards' }, cards)),
    h('div', { class: 'm-foot' }, h('button', { class: 'btn', onclick: () => backdrop.remove() }, 'Close')),
  ]));
  app.appendChild(backdrop);
}

/* ============================================================
   Local backend — runs entirely in the browser.
   Persists to localStorage; mirrors the server's endpoints so
   the UI code can stay unchanged. No network, no install.

// ---- SHA-256 (compact, dependency-free) --------------------
var SHA256 = (function(){
  function S(X,n){return (X>>>n)|(X<<(32-n));}
  function R(X,n){return X>>>n;}
  function Ch(x,y,z){return (x&y)^((~x)&z);}
  function Maj(x,y,z){return (x&y)^(x&z)^(y&z);}
  function Sig0(x){return S(x,2)^S(x,13)^S(x,22);}
  function Sig1(x){return S(x,6)^S(x,11)^S(x,25);}
  function sig0(x){return S(x,7)^S(x,18)^R(x,3);}
  function sig1(x){return S(x,17)^S(x,19)^R(x,10);}
  var K=[1116352408,1899447441,3049323471,3921009573,961987163,1508970993,2453635748,2870763221,3624381080,310598401,607225278,1426881987,1925078388,2162078206,2614888103,3248222580,3835390401,4022224774,264347078,604807628,770255983,1249150122,1555081692,1996064986,2554220882,2821834349,2952996808,3210313671,3336571891,3584528711,113926993,338241895,666307205,773529912,1294757372,1396182291,1695183700,1986661051,2177026350,2456956037,2730485921,2820302411,3259730800,3345764771,3516065817,3600352804,4094571909,275423344,430227734,506948616,659060556,883997877,958139571,1322822218,1537002063,1747873779,1955562222,2024104815,2227730452,2361852424,2428436474,2756734187,3204031479,3329325298];
  function toWords(msg){
    var l=msg.length*8; var w=msg.slice(); w.push(0x80);
    while((w.length%64)!==56)w.push(0);
    w.push(0,0,0,0,(l>>>24)&0xff,(l>>>16)&0xff,(l>>>8)&0xff,l&0xff);
    var words=[]; for(var j=0;j<w.length;j+=4)words.push(((w[j]<<24)|(w[j+1]<<16)|(w[j+2]<<8)|w[j+3])|0); return words;
  }
  function hashBytes(bytes){
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var w=toWords(bytes);
    for(var i=0;i<w.length;i+=16){
      var W=new Array(64); for(var t=0;t<16;t++)W[t]=w[i+t]|0;
      for(t=16;t<64;t++)W[t]=(sig1(W[t-2])+W[t-7]+sig0(W[t-15])+W[t-16])|0;
